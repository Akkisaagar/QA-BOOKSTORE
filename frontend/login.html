<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>QA BookStore Login</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="login-container">

  <div class="login-card">

    <h1>📚 QA BookStore</h1>
    <p>Secure API Testing Platform</p>

    <input
      type="email"
      id="email"
      placeholder="Email">

    <div class="password-wrapper">
  <input
    type="password"
    id="password"
    placeholder="Password">

  <span onclick="togglePassword()">
    👁️
  </span>
</div>
<a href="forgot-password.html">
  Forgot Password?
</a>
<input
  type="email"
  id="email"
  placeholder="Enter Email">

<button onclick="forgotPassword()">
  Send Reset Link
</button>
    <button onclick="login()">
      Login
    </button>

    <button class="google-btn"
            onclick="googleLogin()">
      Continue with Google
    </button>

    <p>
      New User?
      <a href="register.html">
        Register Here
      </a>
    </p>

  </div>

</div>

<script src="login.js"></script>

</body>
</html>
